<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive CBQ Quiz Game</title>
    <style>
        :root {
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #475569;
            --primary: #0d9488;
            --primary-dark: #115e59;
            --success: #16a34a;
            --success-light: #dcfce7;
            --error: #dc2626;
            --error-light: #fee2e2;
            --border: #cbd5e1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        .quiz-container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            padding: 24px;
            position: relative;
            overflow: hidden;
            min-height: 450px;
            display: flex;
            flex-direction: column;
        }

        /* Screen Visibility Control */
        .screen {
            display: none;
            flex-direction: column;
            height: 100%;
            flex-grow: 1;
        }

        .screen.active {
            display: flex;
        }

        /* 1) Splash Screen (Logo Only for 5 Seconds) */
        #splash-screen {
            justify-content: center;
            align-items: center;
        }

        #splash-screen img {
            max-width: 80%;
            height: auto;
            max-height: 150px;
            object-fit: contain;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.98); opacity: 0.8; }
            50% { transform: scale(1.02); opacity: 1; }
            100% { transform: scale(0.98); opacity: 0.8; }
        }

        /* 2) Instruction Screen (No Logo, Simple & Precise) */
        #instruction-screen {
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .ins-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 20px;
            color: var(--primary);
        }

        .ins-box {
            background: var(--bg-color);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 24px;
            text-align: left;
            width: 100%;
        }

        .ins-item {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Action Buttons */
        .btn-action {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
            box-shadow: 0 4px 6px -1px rgba(13, 148, 136, 0.3);
        }

        .btn-action:hover {
            background: var(--primary-dark);
        }

        /* 3) Main Quiz Screen */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--bg-color);
        }

        .mute-btn {
            background: none;
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            background: var(--bg-color);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: 700;
            font-size: 15px;
        }

        .timer {
            color: var(--error);
        }

        .competency-badge {
            align-self: flex-start;
            background: #e0f2fe;
            color: #0369a1;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .question-text {
            font-size: 18px;
            font-weight: 700;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        /* Options Configuration */
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-grow: 1;
        }

        .option-card {
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .option-card.correct {
            background-color: var(--success-light) !important;
            border-color: var(--success) !important;
            color: var(--success) !important;
            font-weight: 700;
        }

        .option-card.wrong {
            background-color: var(--error-light) !important;
            border-color: var(--error) !important;
            color: var(--error) !important;
            opacity: 0.8;
        }

        .option-card.disabled {
            cursor: not-allowed;
        }

        .feedback-msg {
            margin-top: 12px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-weight: 700;
            background: #fff7ed;
            color: #c2410c;
            display: none;
        }

        .action-area {
            margin-top: 20px;
        }

        /* 4) Creative Congratulatory End Screen */
        #result-screen {
            text-align: center;
            justify-content: center;
            align-items: center;
        }

        .congrats-art {
            font-size: 64px;
            margin-bottom: 10px;
            animation: bounce 1.5s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .result-msg-box {
            font-size: 18px;
            font-weight: 700;
            margin: 15px 0 25px 0;
            padding: 16px;
            border-radius: 12px;
            width: 100%;
        }

        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: var(--bg-color);
            border: 4px solid var(--primary);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 15px;
        }

        /* Sparkles Particles Effect */
        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            animation: fly 0.8s ease-out forwards;
            pointer-events: none;
        }

        @keyframes fly {
            0% { transform: translate(0, 0); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        
        <div id="splash-screen" class="screen active">
            <img src="assets/innovine-logo.png" alt="Logo">
        </div>

        <div id="instruction-screen" class="screen">
            <div class="ins-title">निर्देश</div>
            <div class="ins-box">
                <div class="ins-item">⏱️ <span>प्रत्येक प्रश्न के लिए 60 सेकंड का समय मिलेगा।</span></div>
                <div class="ins-item">🔄 <span>गलत उत्तर देने पर केवल 1 और अवसर (कुल 2 चांस) मिलेगा।</span></div>
                <div class="ins-item">🎯 <span>सही विकल्प चुनकर अंक प्राप्त करें।</span></div>
            </div>
            <button class="btn-action" onclick="startQuiz()">शुरू करें 🚀</button>
        </div>

        <div id="quiz-screen" class="screen">
            <div class="game-header">
                <div class="competency-badge" id="competency-box">योग्यता</div>
                <button class="mute-btn" id="muteBtn" onclick="toggleMute()">🔊 आवाज़ ऑन</button>
            </div>
            
            <div class="stats-bar">
                <div id="q-count">प्रश्न: 1/10</div>
                <div id="score-count">अंक: 0/10</div>
                <div class="timer" id="timer-display">⏱️ 60s</div>
            </div>

            <div class="question-text" id="question-box">प्रश्न लोड हो रहा है...</div>

            <div class="options-grid" id="options-container"></div>

            <div class="feedback-msg" id="feedback-box"></div>

            <div class="action-area">
                <button class="btn-action" id="nextBtn" style="display: none;" onclick="nextQuestion()">अगला प्रश्न ➡️</button>
            </div>
        </div>

        <div id="result-screen" class="screen">
            <div class="congrats-art" id="result-emoji">🎉</div>
            <div class="ins-title" id="result-title">बधाई हो!</div>
            <div class="score-circle" id="final-score">0/10</div>
            <div class="result-msg-box" id="result-message">खेलने के लिए धन्यवाद!</div>
            <button class="btn-action" onclick="restartQuiz()">🔄 फिर से खेलें</button>
        </div>

    </div>

    <script>
        // Exactly 10 questions provided in the prompt
        const questions = [
            {
                q: "होली का त्योहार सभी को प्रेम और भाईचारे का संदेश देता है। यदि आपकी कक्षा में अलग-अलग विचारों वाले विद्यार्थी हैं, तो आप होली के संदेश को कैसे अपनाएँगे?",
                options: ["केवल अपने मित्रों के साथ रहेंगे।", "सभी के साथ मिल-जुलकर और सम्मानपूर्वक व्यवहार करेंगे।", "दूसरों की बातों को अनदेखा करेंगे।", "अपनी बात दूसरों पर थोपेंगे।"],
                answer: 1,
                competency: "त्योहार के मूल्यों को दैनिक जीवन में लागू करना"
            },
            {
                q: "होली खेलते समय पर्यावरण और स्वास्थ्य का ध्यान रखते हुए कौन-सा विकल्प सबसे अच्छा होगा?",
                options: ["रासायनिक रंगों का अधिक प्रयोग करना।", "पानी की बहुत अधिक बर्बादी करना।", "प्राकृतिक रंगों का प्रयोग करना और पानी बचाना।", "जानवरों पर रंग डालना।"],
                answer: 2,
                competency: "जिम्मेदार व्यवहार और पर्यावरण संरक्षण"
            },
            {
                q: "होली को “रंगों का त्योहार” कहा जाता है। इसका गहरा अर्थ क्या है?",
                options: ["केवल नए कपड़े पहनना।", "जीवन में खुशियों, विविधताओं और प्रेम के रंग भरना।", "अधिक से अधिक रंग खरीदना।", "केवल एक दिन मनोरंजन करना।"],
                answer: 1,
                competency: "भाव और संदेश को समझना"
            },
            {
                q: "आपके मोहल्ले में कुछ लोग होली के बाद बहुत कचरा फैला देते हैं। इस समस्या का समाधान क्या हो सकता है?",
                options: ["कचरे को वहीं छोड़ देना।", "सफाई अभियान चलाकर लोगों को जागरूक करना।", "और अधिक कचरा फैलाना।", "त्योहार मनाना बंद कर देना।"],
                answer: 1,
                competency: "सामाजिक समस्या का समाधान करना"
            },
            {
                q: "कुछ लोग कहते हैं, “होली केवल रंग खेलने का त्योहार है।” इस विचार का सही मूल्यांकन क्या होगा?",
                options: ["यह सही है क्योंकि इसमें केवल रंगों का उपयोग होता है।", "यह अधूरा विचार है क्योंकि होली प्रेम, एकता और बुराई पर अच्छाई की जीत का संदेश देती है।", "यह सही है क्योंकि त्योहारों का कोई महत्व नहीं होता।", "यह गलत है क्योंकि होली में रंगों का प्रयोग नहीं होता।"],
                answer: 1,
                competency: "विचारों का मूल्यांकन और तर्क प्रस्तुत करना"
            },
            {
                q: "आपका मित्र होली खेलना नहीं चाहता क्योंकि उसे तेज रंगों से एलर्जी होती है। आप क्या करेंगे?",
                options: ["उसे जबरदस्ती रंग लगाएंगे।", "उसकी परेशानी समझकर सुरक्षित तरीके से त्योहार मनाएँगे।", "उसका मज़ाक उड़ाएँगे।", "उससे बात करना बंद कर देंगे।"],
                answer: 1,
                competency: "सहानुभूति और संवेदनशील निर्णय लेना"
            },
            {
                q: "यदि लोग होली पर बहुत अधिक पानी और रासायनिक रंगों का उपयोग करें, तो इसका क्या प्रभाव हो सकता है?",
                options: ["पर्यावरण और स्वास्थ्य को नुकसान पहुँच सकता है।", "पेड़-पौधे तेजी से बढ़ेंगे।", "पानी की मात्रा बढ़ जाएगी।", "प्रदूषण कम हो जाएगा।"],
                answer: 0,
                competency: "कारण और परिणाम का विश्लेषण"
            },
            {
                q: "होली के अवसर पर विद्यालय में सभी विद्यार्थियों को शामिल करने के लिए क्या किया जा सकता है?",
                options: ["काफी कम विद्यार्थियों को भाग लेने देना।", "ऐसा आयोजन करना जिसमें सभी मिलकर खुशी बाँट सकें।", "प्रतियोगिता के कारण दूसरों को रोकना।", "केवल विजेताओं को शामिल करना।"],
                answer: 1,
                competency: "समावेशी व्यवहार और सहयोग"
            },
            {
                q: "होली के साथ जुड़ी “बुराई पर अच्छाई की जीत” की भावना हमें क्या सिखाती है?",
                options: ["हमेशा दूसरों से प्रतिस्पर्धा करनी चाहिए।", "अच्छे विचारों और कार्यों को अपनाना चाहिए।", "केवल त्योहारों के दिन अच्छा व्यवहार करना चाहिए।", "समस्याओं से भाग जाना चाहिए।"],
                answer: 1,
                competency: "नैतिक मूल्यों का विश्लेषण"
            },
            {
                q: "एक विद्यार्थी कहता है, “त्योहार केवल छुट्टी और मनोरंजन के लिए होते हैं।” आप उसे क्या समझाएँगे?",
                options: ["वह सही है क्योंकि त्योहारों का कोई उद्देश्य नहीं होता।", "त्योहार हमें संस्कृति, परंपराओं और जीवन मूल्यों से जोड़ते हैं।", "त्योहारों को मनाना समय की बर्बादी है।", "त्योहार केवल बड़े लोगों के लिए होते हैं।"],
                answer: 1,
                competency: "सांस्कृतिक और मूल्य आधारित समझ"
            }
        ];

        let currentIndex = 0;
        let score = 0;
        let currentAttempts = 0; 
        let timeLeft = 60;
        let timerInterval = null;
        let isMuted = false;

        const sndCorrect = new Audio('assets/correct.mp3');
        const sndWrong = new Audio('assets/wrong.mp3');
        const sndClapping = new Audio('assets/clapping.mp3');

        // 1) Auto Transition Splash Screen after exactly 5 seconds
        window.onload = () => {
            setTimeout(() => {
                switchScreen('instruction-screen');
            }, 5000);
        };

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(scr => scr.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById('muteBtn').innerText = isMuted ? "🔇 आवाज़ म्यूट" : "🔊 आवाज़ ऑन";
        }

        function playSound(audio) {
            if (!isMuted) {
                audio.currentTime = 0;
                audio.play().catch(e => console.log("Audio handling context updated."));
            }
        }

        function startQuiz() {
            switchScreen('quiz-screen');
            loadQuestion();
        }

        function startTimer() {
            clearInterval(timerInterval);
            timeLeft = 60;
            document.getElementById('timer-display').innerText = `⏱️ ${timeLeft}s`;
            
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-display').innerText = `⏱️ ${timeLeft}s`;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    handleTimeout();
                }
            }, 1000);
        }

        function loadQuestion() {
            currentAttempts = 0;
            const currentQuestion = questions[currentIndex];
            
            document.getElementById('q-count').innerText = `प्रश्न: ${currentIndex + 1}/10`;
            document.getElementById('score-count').innerText = `अंक: ${score}/10`;
            document.getElementById('competency-box').innerText = currentQuestion.competency;
            document.getElementById('question-box').innerText = currentQuestion.q;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            document.getElementById('feedback-box').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'none';

            currentQuestion.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-card';
                btn.innerText = opt;
                btn.onclick = () => selectOption(idx, btn);
                container.appendChild(btn);
            });

            startTimer();
        }

        function selectOption(selectedIndex, selectedBtn) {
            const currentQuestion = questions[currentIndex];
            const container = document.getElementById('options-container');
            const feedback = document.getElementById('feedback-box');

            if (selectedIndex === currentQuestion.answer) {
                // Correct Choice
                clearInterval(timerInterval);
                selectedBtn.classList.add('correct');
                playSound(sndCorrect);
                triggerSparkles();
                score++;
                document.getElementById('score-count').innerText = `अंक: ${score}/10`;
                disableAllOptions();
                document.getElementById('nextBtn').style.display = 'block';
            } else {
                // Wrong Choice (Max 2 Attempts System)
                currentAttempts++;
                selectedBtn.classList.add('wrong');
                selectedBtn.onclick = null; 
                playSound(sndWrong);

                if (currentAttempts === 1) {
                    feedback.innerText = "गलत उत्तर! आपके पास 1 आखिरी प्रयास शेष है।";
                    feedback.style.display = 'block';
                } else {
                    // Out of turns, displays right answer directly
                    clearInterval(timerInterval);
                    feedback.style.display = 'none';
                    disableAllOptions();
                    container.children[currentQuestion.answer].classList.add('correct');
                    document.getElementById('nextBtn').style.display = 'block';
                }
            }
        }

        function handleTimeout() {
            disableAllOptions();
            const currentQuestion = questions[currentIndex];
            const container = document.getElementById('options-container');
            container.children[currentQuestion.answer].classList.add('correct');
            
            const feedback = document.getElementById('feedback-box');
            feedback.innerText = "समय समाप्त हो गया!";
            feedback.style.display = 'block';
            document.getElementById('nextBtn').style.display = 'block';
        }

        function disableAllOptions() {
            const options = document.getElementById('options-container').children;
            for (let opt of options) {
                opt.classList.add('disabled');
                opt.onclick = null;
            }
        }

        function triggerSparkles() {
            const container = document.querySelector('.quiz-container');
            for(let i = 0; i < 15; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = '50%';
                p.style.top = '40%';
                p.style.setProperty('--x', (Math.random() * 300 - 150) + 'px');
                p.style.setProperty('--y', (Math.random() * 300 - 150) + 'px');
                p.style.backgroundColor = ['#0d9488', '#22c55e', '#eab308', '#3b82f6'][Math.floor(Math.random()*4)];
                container.appendChild(p);
                setTimeout(() => p.remove(), 800);
            }
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < questions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        // 4) Result Evaluation & Dynamic Congratulations Messaging
        function showResults() {
            switchScreen('result-screen');
            const percent = (score / questions.length) * 100;
            document.getElementById('final-score').innerText = `${score}/10`;

            const emojiEl = document.getElementById('result-emoji');
            const titleEl = document.getElementById('result-title');
            const msgBox = document.getElementById('result-message');

            if (percent >= 75) {
                emojiEl.innerText = "🏆";
                titleEl.innerText = "शानदार प्रदर्शन!";
                msgBox.innerText = "Good job! 🎉 आपने इस विषय के मूल्यों को बहुत अच्छी तरह समझा है।";
                msgBox.style.backgroundColor = "var(--success-light)";
                msgBox.style.color = "var(--success)";
                playSound(sndClapping);
            } else if (percent >= 40) {
                emojiEl.innerText = "👍";
                titleEl.innerText = "सराहनीय प्रयास!";
                msgBox.innerText = "Review this chapter and try again 👍 अपने विचारों को और बेहतर करें।";
                msgBox.style.backgroundColor = "#ffedd5";
                msgBox.style.color = "#c2410c";
            } else {
                emojiEl.innerText = "📚";
                titleEl.innerText = "पुनः प्रयास करें!";
                msgBox.innerText = "Let’s practise more 📚 इन सामाजिक और नैतिक मूल्यों को एक बार फिर समझें।";
                msgBox.style.backgroundColor = "var(--error-light)";
                msgBox.style.color = "var(--error)";
            }
        }

        function restartQuiz() {
            currentIndex = 0;
            score = 0;
            switchScreen('instruction-screen');
        }
    </script>
</body>
</html>
