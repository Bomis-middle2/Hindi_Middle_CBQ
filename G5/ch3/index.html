<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive CBQ Quiz Game</title>
    <style>
        :root {
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #475569;
            --primary: #0d9488;
            --primary-dark: #115e59;
            --success: #16a34a;
            --success-light: #dcfce7;
            --error: #dc2626;
            --error-light: #fee2e2;
            --border: #cbd5e1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        .quiz-container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            padding: 24px;
            position: relative;
            overflow: hidden;
            min-height: 450px;
            display: flex;
            flex-direction: column;
        }

        /* Screen Visibility Control */
        .screen {
            display: none;
            flex-direction: column;
            height: 100%;
            flex-grow: 1;
        }

        .screen.active {
            display: flex;
        }

        /* 1) Splash Screen (Logo Only for 5 Seconds) */
        #splash-screen {
            justify-content: center;
            align-items: center;
        }

        #splash-screen img {
            max-width: 80%;
            height: auto;
            max-height: 150px;
            object-fit: contain;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.98); opacity: 0.8; }
            50% { transform: scale(1.02); opacity: 1; }
            100% { transform: scale(0.98); opacity: 0.8; }
        }

        /* 2) Instruction Screen (No Logo, Simple & Precise) */
        #instruction-screen {
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .ins-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 20px;
            color: var(--primary);
        }

        .ins-box {
            background: var(--bg-color);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 24px;
            text-align: left;
            width: 100%;
        }

        .ins-item {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Action Buttons */
        .btn-action {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
            box-shadow: 0 4px 6px -1px rgba(13, 148, 136, 0.3);
        }

        .btn-action:hover {
            background: var(--primary-dark);
        }

        /* 3) Main Quiz Screen */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--bg-color);
        }

        .mute-btn {
            background: none;
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            background: var(--bg-color);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: 700;
            font-size: 15px;
        }

        .timer {
            color: var(--error);
        }

        .competency-badge {
            align-self: flex-start;
            background: #e0f2fe;
            color: #0369a1;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .question-text {
            font-size: 18px;
            font-weight: 700;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        /* Options Configuration (Large enough for tapping, no scrolling) */
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-grow: 1;
        }

        .option-card {
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .option-card.correct {
            background-color: var(--success-light) !important;
            border-color: var(--success) !important;
            color: var(--success) !important;
            font-weight: 700;
        }

        .option-card.wrong {
            background-color: var(--error-light) !important;
            border-color: var(--error) !important;
            color: var(--error) !important;
            opacity: 0.8;
        }

        .option-card.disabled {
            cursor: not-allowed;
        }

        .feedback-msg {
            margin-top: 12px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-weight: 700;
            background: #fff7ed;
            color: #c2410c;
            display: none;
        }

        .action-area {
            margin-top: 20px;
        }

        /* 4) Creative Congratulatory End Screen */
        #result-screen {
            text-align: center;
            justify-content: center;
            align-items: center;
        }

        .congrats-art {
            font-size: 64px;
            margin-bottom: 10px;
            animation: bounce 1.5s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .result-msg-box {
            font-size: 18px;
            font-weight: 700;
            margin: 15px 0 25px 0;
            padding: 16px;
            border-radius: 12px;
            width: 100%;
        }

        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: var(--bg-color);
            border: 4px solid var(--primary);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 15px;
        }

        /* Sparkles/Particles Animation Effect */
        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            animation: fly 0.8s ease-out forwards;
            pointer-events: none;
        }

        @keyframes fly {
            0% { transform: translate(0, 0); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        
        <div id="splash-screen" class="screen active">
            <img src="assets/innovine-logo.png" alt="Logo">
        </div>

        <div id="instruction-screen" class="screen">
            <div class="ins-title">निर्देश</div>
            <div class="ins-box">
                <div class="ins-item">⏱️ <span>प्रत्येक प्रश्न के लिए 60 सेकंड का समय मिलेगा।</span></div>
                <div class="ins-item">🔄 <span>गलत उत्तर देने पर केवल 1 और अवसर (कुल 2 चांस) मिलेगा।</span></div>
                <div class="ins-item">🎯 <span>सही विकल्प चुनकर अंक प्राप्त करें।</span></div>
            </div>
            <button class="btn-action" onclick="startQuiz()">शुरू करें 🚀</button>
        </div>

        <div id="quiz-screen" class="screen">
            <div class="game-header">
                <div class="competency-badge" id="competency-box">योग्यता</div>
                <button class="mute-btn" id="muteBtn" onclick="toggleMute()">🔊 आवाज़ ऑन</button>
            </div>
            
            <div class="stats-bar">
                <div id="q-count">प्रश्न: 1/10</div>
                <div id="score-count">अंक: 0/10</div>
                <div class="timer" id="timer-display">⏱️ 60s</div>
            </div>

            <div class="question-text" id="question-box">प्रश्न लोड हो रहा है...</div>

            <div class="options-grid" id="options-container"></div>

            <div class="feedback-msg" id="feedback-box"></div>

            <div class="action-area">
                <button class="btn-action" id="nextBtn" style="display: none;" onclick="nextQuestion()">अगला प्रश्न ➡️</button>
            </div>
        </div>

        <div id="result-screen" class="screen">
            <div class="congrats-art" id="result-emoji">🎉</div>
            <div class="ins-title" id="result-title">बधाई हो!</div>
            <div class="score-circle" id="final-score">0/10</div>
            <div class="result-msg-box" id="result-message">खेलने के लिए धन्यवाद!</div>
            <button class="btn-action" onclick="restartQuiz()">🔄 फिर से खेलें</button>
        </div>

    </div>

    <script>
        // Dataset transformed to meet exactly 10 questions constraint
        const questions = [
            {
                q: "यदि आप कोणार्क सूर्य मंदिर की यात्रा पर जाएँ, तो वहाँ की धरोहर को सुरक्षित रखने के लिए आप क्या करेंगे?",
                options: ["मंदिर की दीवारों पर अपना नाम लिखेंगे।", "नक्काशी को छूकर उसकी जाँच करेंगे।", "स्वच्छता बनाए रखेंगे और ऐतिहासिक वस्तुओं की रक्षा करेंगे।", "पत्थरों का छोटा टुकड़ा यादगार के रूप में ले आएँगे।"],
                answer: 2,
                competency: "धरोहर के संरक्षण के लिए जिम्मेदार व्यवहार"
            },
            {
                q: "कोणार्क मंदिर के निर्माण में 1200 कारीगरों ने वर्षों तक मेहनत की। आज के समय में इस बात से हमें क्या सीख मिलती है?",
                options: ["बड़े कार्य केवल मशीनों से पूरे होते हैं।", "धैर्य, मेहनत और मिल-जुलकर काम करने से कठिन कार्य पूरे हो सकते हैं।", "पुराने समय के लोग ही अच्छे काम कर सकते थे।", "कला का कोई महत्व नहीं होता।"],
                answer: 1,
                competency: "ऐतिहासिक घटना से जीवन-मूल्य"
            },
            {
                q: "कोणार्क सूर्य मंदिर को रथ के आकार में बनाया गया है। इसका मुख्य उद्देश्य क्या दर्शाता है?",
                options: ["केवल मंदिर को बड़ा दिखाना", "सूर्य देव के गतिशील स्वरूप और शक्ति को दर्शाना", "लोगों को भ्रमित करना", "मंदिर निर्माण को आसान बनाना"],
                answer: 1,
                competency: "प्रतीकों के अर्थ की समझ"
            },
            {
                q: "यदि किसी ऐतिहासिक इमारत की दीवारों पर लोग लिखने लगें, तो उसके संरक्षण के लिए सबसे अच्छा उपाय क्या होगा?",
                options: ["इमारत को बंद कर देना", "लोगों को जागरूक करना और नियमों का पालन करवाना", "दीवारों को रंग से ढक देना", "इमारत को तोड़ देना"],
                answer: 1,
                competency: "समस्या समाधान और जिम्मेदार निर्णय"
            },
            {
                q: "लेखक ने कहा कि “पत्थरों की भाषा इंसान की भाषा से श्रेष्ठतर है।” इस कथन का सही अर्थ क्या है?",
                options: ["पत्थर बोल सकते हैं।", "कला और वास्तुकला इतिहास की कहानियाँ सुनाती हैं।", "इंसानों की भाषा का कोई महत्व नहीं है।", "पत्थर हमेशा सुंदर होते हैं।"],
                answer: 1,
                competency: "साहित्यिक भाव और संदेश विश्लेषण"
            },
            {
                q: "यदि आपको अपने विद्यालय में भारतीय धरोहर पर प्रदर्शनी लगानी हो, तो कोणार्क मंदिर से जुड़ी कौन-सी जानकारी शामिल करना सबसे उचित होगा?",
                options: ["केवल मंदिर की ऊँचाई", "केवल उसका रंग", "उसकी वास्तुकला, इतिहास और निर्माण की विशेषताएँ", "केवल यात्रा की तारीख"],
                answer: 2,
                competency: "आवश्यक जानकारी का उपयोग"
            },
            {
                q: "कोणार्क मंदिर के पहियों को समय मापने के लिए उपयोग किया जाता था। इससे क्या पता चलता है?",
                options: ["पुराने लोग केवल मनोरंजन करते थे।", "प्राचीन भारतीय ज्ञान और विज्ञान बहुत विकसित था।", "मंदिर केवल पूजा के लिए बनाए जाते थे।", "पहिए केवल सजावट के लिए थे।"],
                answer: 1,
                competency: "कारण और प्रभाव आधारित निष्कर्ष"
            },
            {
                q: "आपके मित्र का मानना है कि पुराने स्मारकों का कोई उपयोग नहीं है। आप उसे क्या समझाएँगे?",
                options: ["पुराने स्मारक केवल देखने के लिए होते हैं।", "वे हमें इतिहास, संस्कृति और पूर्वजों की उपलब्धियों से जोड़ते हैं।", "उन्हें हटाकर नई इमारतें बनानी चाहिए।", "वे समय की बर्बादी हैं।"],
                answer: 1,
                competency: "विरासत के महत्व का तर्क"
            },
            {
                q: "आज के समय में मशीनों की सहायता से बड़ी इमारतें बनाई जाती हैं, जबकि कोणार्क मंदिर हाथों से बनाया गया था। इससे क्या निष्कर्ष निकलता है?",
                options: ["पुराने लोग कम सक्षम थे।", "आधुनिक तकनीक और मानवीय कौशल दोनों महत्वपूर्ण हैं।", "मशीनों की आवश्यकता नहीं है।", "पुराने निर्माण हमेशा कमजोर होते हैं।"],
                answer: 1,
                competency: "तुलना करके संतुलित निष्कर्ष"
            },
            {
                q: "यदि कोणार्क मंदिर को विश्व धरोहर स्थल घोषित किया गया है, तो इसका मुख्य कारण क्या हो सकता है?",
                options: ["क्योंकि यह बहुत नया मंदिर है।", "क्योंकि यह केवल एक धार्मिक स्थान है।", "क्योंकि यह कला, इतिहास और वास्तुकला की महत्वपूर्ण विरासत है।", "क्योंकि यहाँ केवल पर्यटक आते हैं।"],
                answer: 2,
                competency: "निर्णय के पीछे कारणों का मूल्यांकन"
            }
        ];

        let currentIndex = 0;
        let score = 0;
        let currentAttempts = 0; 
        let timeLeft = 60;
        let timerInterval = null;
        let isMuted = false;

        const sndCorrect = new Audio('assets/correct.mp3');
        const sndWrong = new Audio('assets/wrong.mp3');
        const sndClapping = new Audio('assets/clapping.mp3');

        // 1) Auto Transition Splash Screen after exactly 5 seconds
        window.onload = () => {
            setTimeout(() => {
                switchScreen('instruction-screen');
            }, 5000);
        };

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(scr => scr.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById('muteBtn').innerText = isMuted ? "🔇 आवाज़ म्यूट" : "🔊 आवाज़ ऑन";
        }

        function playSound(audio) {
            if (!isMuted) {
                audio.currentTime = 0;
                audio.play().catch(e => console.log("Audio handling context updated."));
            }
        }

        function startQuiz() {
            switchScreen('quiz-screen');
            loadQuestion();
        }

        function startTimer() {
            clearInterval(timerInterval);
            timeLeft = 60;
            document.getElementById('timer-display').innerText = `⏱️ ${timeLeft}s`;
            
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-display').innerText = `⏱️ ${timeLeft}s`;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    handleTimeout();
                }
            }, 1000);
        }

        function loadQuestion() {
            currentAttempts = 0;
            const currentQuestion = questions[currentIndex];
            
            document.getElementById('q-count').innerText = `प्रश्न: ${currentIndex + 1}/10`;
            document.getElementById('score-count').innerText = `अंक: ${score}/10`;
            document.getElementById('competency-box').innerText = currentQuestion.competency;
            document.getElementById('question-box').innerText = currentQuestion.q;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            document.getElementById('feedback-box').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'none';

            currentQuestion.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-card';
                btn.innerText = opt;
                btn.onclick = () => selectOption(idx, btn);
                container.appendChild(btn);
            });

            startTimer();
        }

        function selectOption(selectedIndex, selectedBtn) {
            const currentQuestion = questions[currentIndex];
            const container = document.getElementById('options-container');
            const feedback = document.getElementById('feedback-box');

            if (selectedIndex === currentQuestion.answer) {
                // Correct Choice Handled
                clearInterval(timerInterval);
                selectedBtn.classList.add('correct');
                playSound(sndCorrect);
                triggerSparkles();
                score++;
                document.getElementById('score-count').innerText = `अंक: ${score}/10`;
                disableAllOptions();
                document.getElementById('nextBtn').style.display = 'block';
            } else {
                // Wrong Choice Handled (Max 2 Attempts Checked)
                currentAttempts++;
                selectedBtn.classList.add('wrong');
                selectedBtn.onclick = null; 
                playSound(sndWrong);

                if (currentAttempts === 1) {
                    feedback.innerText = "गलत उत्तर! आपके पास 1 आखिरी प्रयास शेष है।";
                    feedback.style.display = 'block';
                } else {
                    // Out of turns, displays right answer directly
                    clearInterval(timerInterval);
                    feedback.style.display = 'none';
                    disableAllOptions();
                    container.children[currentQuestion.answer].classList.add('correct');
                    document.getElementById('nextBtn').style.display = 'block';
                }
            }
        }

        function handleTimeout() {
            disableAllOptions();
            const currentQuestion = questions[currentIndex];
            const container = document.getElementById('options-container');
            container.children[currentQuestion.answer].classList.add('correct');
            
            const feedback = document.getElementById('feedback-box');
            feedback.innerText = "समय समाप्त हो गया!";
            feedback.style.display = 'block';
            document.getElementById('nextBtn').style.display = 'block';
        }

        function disableAllOptions() {
            const options = document.getElementById('options-container').children;
            for (let opt of options) {
                opt.classList.add('disabled');
                opt.onclick = null;
            }
        }

        function triggerSparkles() {
            const container = document.querySelector('.quiz-container');
            for(let i = 0; i < 15; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = '50%';
                p.style.top = '40%';
                p.style.setProperty('--x', (Math.random() * 300 - 150) + 'px');
                p.style.setProperty('--y', (Math.random() * 300 - 150) + 'px');
                p.style.backgroundColor = ['#0d9488', '#22c55e', '#eab308', '#3b82f6'][Math.floor(Math.random()*4)];
                container.appendChild(p);
                setTimeout(() => p.remove(), 800);
            }
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < questions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        // 4) Result Evaluation & Dynamic Congratulations Messaging
        function showResults() {
            switchScreen('result-screen');
            const percent = (score / questions.length) * 100;
            document.getElementById('final-score').innerText = `${score}/10`;

            const emojiEl = document.getElementById('result-emoji');
            const titleEl = document.getElementById('result-title');
            const msgBox = document.getElementById('result-message');

            if (percent >= 75) {
                emojiEl.innerText = "🏆";
                titleEl.innerText = "शानदार प्रदर्शन!";
                msgBox.innerText = "Good job! 🎉 आपने हमारी सांस्कृतिक धरोहर को बेहतरीन ढंग से समझा है।";
                msgBox.style.backgroundColor = "var(--success-light)";
                msgBox.style.color = "var(--success)";
                playSound(sndClapping);
            } else if (percent >= 40) {
                emojiEl.innerText = "👍";
                titleEl.innerText = "सराहनीय प्रयास!";
                msgBox.innerText = "Review this chapter and try again 👍 अपनी समझ को और बेहतर करें।";
                msgBox.style.backgroundColor = "#ffedd5";
                msgBox.style.color = "#c2410c";
            } else {
                emojiEl.innerText = "📚";
                titleEl.innerText = "पुनः प्रयास करें!";
                msgBox.innerText = "Let’s practise more 📚 इतिहास और कला को एक बार फिर समझें।";
                msgBox.style.backgroundColor = "var(--error-light)";
                msgBox.style.color = "var(--error)";
            }
        }

        function restartQuiz() {
            currentIndex = 0;
            score = 0;
            switchScreen('instruction-screen');
        }
    </script>
</body>
</html>
