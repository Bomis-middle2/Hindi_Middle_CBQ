<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Gopal & Mittu Competency Quiz</title>
    <style>
        :root {
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #475569;
            --primary: #0d9488;
            --primary-dark: #115e59;
            --accent: #f59e0b;
            --success: #16a34a;
            --success-light: #dcfce7;
            --error: #dc2626;
            --error-light: #fee2e2;
            --border: #cbd5e1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        .quiz-container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            padding: 24px;
            position: relative;
            overflow: hidden;
            min-height: 450px;
            display: flex;
            flex-direction: column;
        }

        /* Screen Visibility Control */
        .screen {
            display: none;
            flex-direction: column;
            height: 100%;
            flex-grow: 1;
        }

        .screen.active {
            display: flex;
        }

        /* 1) SVG/CSS Logo Splash Screen */
        #splash-screen {
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ffffff 0%, #f0fdfa 100%);
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .logo-text {
            font-size: 32px;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: 1px;
        }

        .logo-text span {
            color: var(--accent);
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.9; }
        }

        /* 2) Instruction Screen */
        #instruction-screen {
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .ins-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 20px;
            color: var(--primary);
        }

        .ins-box {
            background: var(--bg-color);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 24px;
            text-align: left;
            width: 100%;
        }

        .ins-item {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Action Buttons */
        .btn-action {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
            box-shadow: 0 4px 6px -1px rgba(13, 148, 136, 0.3);
        }

        .btn-action:hover {
            background: var(--primary-dark);
        }

        /* 3) Main Quiz Screen */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--bg-color);
        }

        .mute-btn {
            background: none;
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            background: var(--bg-color);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: 700;
            font-size: 15px;
        }

        .timer {
            color: var(--error);
        }

        .competency-badge {
            align-self: flex-start;
            background: #e0f2fe;
            color: #0369a1;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .question-text {
            font-size: 18px;
            font-weight: 700;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        /* Options Grid */
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-grow: 1;
        }

        .option-card {
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .option-card.correct {
            background-color: var(--success-light) !important;
            border-color: var(--success) !important;
            color: var(--success) !important;
            font-weight: 700;
        }

        .option-card.wrong {
            background-color: var(--error-light) !important;
            border-color: var(--error) !important;
            color: var(--error) !important;
            opacity: 0.8;
        }

        .option-card.disabled {
            cursor: not-allowed;
        }

        .feedback-msg {
            margin-top: 12px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-weight: 700;
            background: #fff7ed;
            color: #c2410c;
            display: none;
        }

        .action-area {
            margin-top: 20px;
        }

        /* 4) End Result Screen */
        #result-screen {
            text-align: center;
            justify-content: center;
            align-items: center;
        }

        .congrats-art {
            font-size: 64px;
            margin-bottom: 10px;
            animation: bounce 1.5s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .result-msg-box {
            font-size: 18px;
            font-weight: 700;
            margin: 15px 0 25px 0;
            padding: 16px;
            border-radius: 12px;
            width: 100%;
        }

        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: var(--bg-color);
            border: 4px solid var(--primary);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 15px;
        }

        /* Sparkles Particles Effect */
        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            animation: fly 0.8s ease-out forwards;
            pointer-events: none;
        }

        @keyframes fly {
            0% { transform: translate(0, 0); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        
        <div id="splash-screen" class="screen active">
            <div class="logo-container">
                <svg width="120" height="120" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" style="animation: pulse 2s infinite;">
                    <circle cx="50" cy="50" r="42" stroke="#0d9488" stroke-width="6" fill="#ccfbf1"/>
                    <path d="M30 40 L50 25 L70 40 L70 75 L30 75 Z" fill="#0d9488"/>
                    <path d="M45 50 L55 50 M50 45 L50 55" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
                </svg>
                <div class="logo-text">Inno<span>vine</span></div>
            </div>
        </div>

        <div id="instruction-screen" class="screen">
            <div class="ins-title">निर्देश</div>
            <div class="ins-box">
                <div class="ins-item">⏱️ <span>प्रत्येक प्रश्न के लिए 60 सेकंड का समय मिलेगा।</span></div>
                <div class="ins-item">🔄 <span>गलत उत्तर देने पर केवल 1 और अवसर (कुल 2 चांस) मिलेगा।</span></div>
                <div class="ins-item">🎯 <span>सही विकल्प चुनकर अंक प्राप्त करें।</span></div>
            </div>
            <button class="btn-action" onclick="startQuiz()">शुरू करें 🚀</button>
        </div>

        <div id="quiz-screen" class="screen">
            <div class="game-header">
                <div class="competency-badge" id="competency-box">योग्यता</div>
                <button class="mute-btn" id="muteBtn" onclick="toggleMute()">🔊 आवाज़ ऑन</button>
            </div>
            
            <div class="stats-bar">
                <div id="q-count">प्रश्न: 1/10</div>
                <div id="score-count">अंक: 0/10</div>
                <div class="timer" id="timer-display">⏱️ 60s</div>
            </div>

            <div class="question-text" id="question-box">प्रश्न लोड हो रहा है...</div>

            <div class="options-grid" id="options-container"></div>

            <div class="feedback-msg" id="feedback-box"></div>

            <div class="action-area">
                <button class="btn-action" id="nextBtn" style="display: none;" onclick="nextQuestion()">अगला प्रश्न ➡️</button>
            </div>
        </div>

        <div id="result-screen" class="screen">
            <div class="congrats-art" id="result-emoji">🎉</div>
            <div class="ins-title" id="result-title">बधाई हो!</div>
            <div class="score-circle" id="final-score">0/10</div>
            <div class="result-msg-box" id="result-message">खेलने के लिए धन्यवाद!</div>
            <button class="btn-action" onclick="restartQuiz()">🔄 फिर से खेलें</button>
        </div>

    </div>
